<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>儿童电风扇模拟器</title>
  <style>
    :root {
      --bg-top: #eff9ff;
      --bg-bottom: #ffe8d4;
      --card: #ffffffcc;
      --text: #174067;
      --accent: #ff7b54;
      --accent-2: #41b3a3;
      --soft-blue: #89d5ff;
      --shadow: 0 16px 40px rgba(23, 64, 103, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Verdana", sans-serif;
      color: var(--text);
      background: linear-gradient(170deg, var(--bg-top), var(--bg-bottom));
      overflow-x: hidden;
    }

    .decor {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      opacity: 0.45;
      animation: float 9s ease-in-out infinite;
    }

    .bubble.one {
      width: 220px;
      height: 220px;
      left: -70px;
      top: 20px;
      background: radial-gradient(circle at 30% 30%, #c7ecff, #89d5ff);
    }

    .bubble.two {
      width: 260px;
      height: 260px;
      right: -120px;
      top: 35%;
      background: radial-gradient(circle at 70% 30%, #ffd8b8, #ffb87f);
      animation-delay: 1.2s;
    }

    .bubble.three {
      width: 190px;
      height: 190px;
      left: 35%;
      bottom: -70px;
      background: radial-gradient(circle at 50% 20%, #cef7ef, #79d8c9);
      animation-delay: 2.4s;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .panel {
      background: var(--card);
      border: 2px solid #ffffff;
      backdrop-filter: blur(8px);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px;
      animation: rise 550ms ease;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      letter-spacing: 0.4px;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 1rem;
      opacity: 0.86;
    }

    .content {
      display: grid;
      gap: 20px;
      grid-template-columns: 1fr;
      margin-top: 24px;
      align-items: stretch;
    }

    .fan-zone {
      background: #ffffff;
      border-radius: 20px;
      border: 2px solid #cfeeff;
      min-height: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .corner-counter {
      position: absolute;
      left: 14px;
      top: 14px;
      z-index: 3;
      padding: 8px 12px;
      border-radius: 12px;
      background: #eefcf5;
      border: 2px solid #bfe8d3;
      box-shadow: 0 6px 14px rgba(20, 87, 61, 0.15);
      display: flex;
      align-items: center;
      gap: 6px;
      color: #1c6b4b;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .fan {
      width: min(70vw, 320px);
      aspect-ratio: 1;
      position: relative;
      transform: translateY(-10px);
    }

    .guard {
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      border: 6px solid #95c8f2;
      box-shadow: inset 0 0 0 6px #e7f5ff;
      background: repeating-radial-gradient(
        circle,
        #ffffff 0,
        #ffffff 10px,
        #ecf7ff 10px,
        #ecf7ff 14px
      );
    }

    .rotor {
      position: absolute;
      inset: 18%;
      border-radius: 50%;
      animation: spin 2s linear infinite;
      animation-play-state: paused;
      transform-origin: center center;
    }

    .blade {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 45%;
      height: 22%;
      background: linear-gradient(90deg, #93d4ff 0%, #4eaef2 100%);
      border-radius: 70% 35% 65% 25%;
      transform-origin: 0 50%;
      box-shadow: 0 4px 10px rgba(39, 122, 186, 0.25);
    }

    .blade.one {
      transform: translate(0, -50%) rotate(0deg);
    }

    .blade.two {
      transform: translate(0, -50%) rotate(120deg);
    }

    .blade.three {
      transform: translate(0, -50%) rotate(240deg);
    }

    .hub {
      position: absolute;
      width: 70px;
      height: 70px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle at 30% 20%, #ffd26d, #ff9f1c);
      border: 4px solid #fff5da;
      z-index: 2;
    }

    .stand {
      position: absolute;
      width: 40px;
      height: 140px;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: linear-gradient(#9bc5e8, #5fa8dc);
      border-radius: 20px;
      z-index: 0;
    }

    .base {
      position: absolute;
      width: 180px;
      height: 28px;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      background: linear-gradient(90deg, #4b88b9, #2b6f9e);
      border-radius: 999px;
      box-shadow: 0 6px 14px rgba(43, 111, 158, 0.35);
    }

    .wind {
      position: absolute;
      right: 24px;
      top: 26%;
      width: 32%;
      min-width: 120px;
      opacity: 0;
      transition: opacity 250ms ease;
    }

    .wind-line {
      height: 8px;
      border-radius: 999px;
      margin: 14px 0;
      background: linear-gradient(90deg, #d6f0ff, #8ed8ff);
      animation: drift 1.3s linear infinite;
    }

    .wind-line:nth-child(2) {
      animation-delay: 0.3s;
    }

    .wind-line:nth-child(3) {
      animation-delay: 0.6s;
    }

    .show-wind {
      opacity: 0.95;
    }

    .control-zone {
      background: #fff;
      border-radius: 20px;
      border: 2px solid #ffe6d6;
      padding: 16px;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .status {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
      color: #0f5a78;
      min-height: 48px;
    }

    .step {
      margin: 0;
      padding: 10px 12px;
      border-radius: 14px;
      background: #f1fbff;
      border: 1px dashed #9fd8f9;
      line-height: 1.4;
      font-size: 0.95rem;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease, opacity 180ms ease;
    }

    button:active {
      transform: translateY(2px);
    }

    button:hover {
      filter: brightness(1.06);
    }

    button[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.25);
    }

    .power {
      background: linear-gradient(135deg, var(--accent), #ff9966);
      min-width: 130px;
    }

    .speed {
      background: linear-gradient(135deg, var(--accent-2), #35a699);
      min-width: 90px;
    }

    .active {
      outline: 3px solid #fff6b3;
      box-shadow: 0 0 0 4px rgba(255, 208, 102, 0.45);
    }

    .legend {
      margin: 2px 0 0;
      font-size: 0.92rem;
      opacity: 0.82;
    }

    .timer-card {
      background: #fff8ef;
      border: 2px solid #ffd7b8;
      border-radius: 16px;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .timer-title {
      margin: 0;
      font-weight: 700;
      color: #8c4f2b;
    }

    .timer-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .timer-knob {
      --angle: -135deg;
      width: 118px;
      height: 118px;
      padding: 0;
      border-radius: 50%;
      border: 6px solid #ffd6a9;
      background: radial-gradient(circle at 35% 30%, #fffef9, #ffe8ce);
      position: relative;
      box-shadow: inset 0 -8px 14px rgba(189, 104, 41, 0.2), 0 8px 18px rgba(189, 104, 41, 0.18);
      touch-action: none;
      user-select: none;
      cursor: grab;
      transition: box-shadow 120ms ease;
    }

    .timer-knob:hover {
      filter: none;
    }

    .timer-knob:active {
      transform: none;
    }

    .timer-knob.dragging {
      cursor: grabbing;
      box-shadow: inset 0 -8px 14px rgba(189, 104, 41, 0.2), 0 10px 22px rgba(189, 104, 41, 0.24);
    }

    .timer-knob::before {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: 50%;
      border: 2px dashed #ffbb80;
    }

    .knob-dot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ff7b54;
      box-shadow: 0 0 0 4px #fff4e8;
      transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-43px);
      transition: transform 950ms linear;
    }

    .timer-knob.dragging .knob-dot {
      transition: none;
    }

    .knob-center {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(#ffc587, #ff9d4f);
      border: 3px solid #fff1df;
    }

    .timer-readout {
      display: grid;
      gap: 6px;
    }

    .timer-value {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      color: #9a4d00;
      min-width: 110px;
    }

    .timer-hint {
      margin: 0;
      font-size: 0.9rem;
      color: #865230;
    }

    .timer-tip {
      margin: 0;
      font-size: 0.9rem;
      color: #6f4f39;
      line-height: 1.4;
    }

    .counter-card {
      background: #eefcf5;
      border: 2px solid #bfe8d3;
      border-radius: 16px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .counter-label {
      margin: 0;
      font-size: 0.95rem;
      color: #1c6b4b;
      font-weight: 700;
    }

    .counter-text {
      margin: 0;
      font-size: 1rem;
      color: #1c6b4b;
      font-weight: 700;
    }

    .counter-value {
      display: inline-block;
      min-width: 2ch;
      text-align: center;
      padding: 2px 8px;
      border-radius: 999px;
      background: #d6f4e6;
      color: #0f5f40;
      margin-left: 6px;
    }

    .counter-reset {
      background: linear-gradient(135deg, #2c9b76, #1f7b5d);
      min-width: 90px;
      padding: 10px 12px;
      font-size: 0.92rem;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes drift {
      from { transform: translateX(0); opacity: 0.75; }
      to { transform: translateX(16px); opacity: 1; }
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
      100% { transform: translateY(0); }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (min-width: 860px) {
      .content {
        grid-template-columns: 1.2fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="decor" aria-hidden="true">
    <div class="bubble one"></div>
    <div class="bubble two"></div>
    <div class="bubble three"></div>
  </div>

  <main class="app">
    <section class="panel">
      <h1>儿童电风扇模拟器</h1>
      <p class="subtitle">先学会开和关，再学习低、中、高三档风速。</p>

      <div class="content">
        <div class="fan-zone" aria-label="电风扇展示区">
          <div class="corner-counter" aria-live="polite">
            圈数: <span class="counter-value" id="setCounterValue">0</span>
          </div>

          <div class="fan">
            <div class="guard"></div>
            <div class="rotor" id="rotor" aria-label="风扇叶片">
              <div class="blade one"></div>
              <div class="blade two"></div>
              <div class="blade three"></div>
            </div>
            <div class="hub"></div>
            <div class="stand"></div>
            <div class="base"></div>
          </div>

          <div class="wind" id="wind" aria-hidden="true">
            <div class="wind-line"></div>
            <div class="wind-line"></div>
            <div class="wind-line"></div>
          </div>
        </div>

        <aside class="control-zone">
          <p class="status" id="statusText">当前状态: 关机</p>
          <p class="step" id="lessonText">第1步: 点击“打开风扇”，学习开关电风扇。</p>

          <div class="btn-row">
            <button class="power" id="powerBtn">打开风扇</button>
          </div>

          <div class="btn-row">
            <button class="speed" id="pauseBtn" disabled>暂停</button>
            <button class="speed" id="lowBtn" disabled>低档</button>
            <button class="speed" id="midBtn" disabled>中档</button>
            <button class="speed" id="highBtn" disabled>高档</button>
          </div>

          <section class="timer-card" aria-label="计时器设置区">
            <p class="timer-title">计时器 (0~2分钟)</p>
            <div class="timer-wrap">
              <button class="timer-knob" id="timerKnob" aria-label="旋转设置倒计时" aria-valuemin="0" aria-valuemax="120" aria-valuenow="0">
                <span class="knob-dot" id="knobDot"></span>
                <span class="knob-center"></span>
              </button>
              <div class="timer-readout">
                <p class="timer-value" id="timerValue">0:00</p>
                <p class="timer-hint" id="timerHint">0表示不计时</p>
              </div>
            </div>
            <p class="timer-tip">旋转按钮设置时间，开机后开始倒计时，倒计时到0会自动关闭风扇。</p>
          </section>

          <section class="counter-card" aria-label="风扇转圈计数器">
            <p class="counter-label">点击可清零圈数</p>
            <button class="counter-reset" id="resetCounterBtn">重置</button>
          </section>

          <p class="legend">风速变化会让叶片旋转更快，风线动画也会更快。</p>
        </aside>
      </div>
    </section>
  </main>

  <script>
    const rotor = document.getElementById("rotor");
    const wind = document.getElementById("wind");
    const statusText = document.getElementById("statusText");
    const lessonText = document.getElementById("lessonText");

    const powerBtn = document.getElementById("powerBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const lowBtn = document.getElementById("lowBtn");
    const midBtn = document.getElementById("midBtn");
    const highBtn = document.getElementById("highBtn");
    const timerKnob = document.getElementById("timerKnob");
    const knobDot = document.getElementById("knobDot");
    const timerValue = document.getElementById("timerValue");
    const timerHint = document.getElementById("timerHint");
    const setCounterValue = document.getElementById("setCounterValue");
    const resetCounterBtn = document.getElementById("resetCounterBtn");

    const speedButtons = [pauseBtn, lowBtn, midBtn, highBtn];

    const speedSettings = {
      pause: { duration: 1.6, wind: 1.4, label: "暂停档" },
      low: { duration: 1.6, wind: 1.4, label: "低档" },
      mid: { duration: 1.0, wind: 1.0, label: "中档" },
      high: { duration: 0.55, wind: 0.65, label: "高档" }
    };

    let isOn = false;
    let currentSpeed = "low";
    let timerSetSec = 0;
    let timerRemainingSec = 0;
    let timerIntervalId = null;
    let isKnobDragging = false;
    let fanRotationCount = 0;

    function formatTime(totalSec) {
      const m = Math.floor(totalSec / 60);
      const s = String(totalSec % 60).padStart(2, "0");
      return `${m}:${s}`;
    }

    function secondsToAngle(sec) {
      return -135 + (sec / 120) * 270;
    }

    function angleToSeconds(angle) {
      const clamped = Math.max(-135, Math.min(135, angle));
      return Math.round(((clamped + 135) / 270) * 120);
    }

    function updateTimerVisual() {
      const displaySec = isOn && timerSetSec > 0 ? timerRemainingSec : timerSetSec;
      const angle = secondsToAngle(displaySec);
      timerKnob.style.setProperty("--angle", `${angle}deg`);
      knobDot.style.setProperty("--angle", `${angle}deg`);
      timerKnob.setAttribute("aria-valuenow", String(displaySec));
      timerValue.textContent = formatTime(displaySec);

      if (timerSetSec === 0) {
        timerHint.textContent = "0表示不计时";
      } else if (isOn) {
        timerHint.textContent = "倒计时进行中";
      } else {
        timerHint.textContent = "开机后开始倒计时";
      }
    }

    function stopTimerCountdown() {
      if (timerIntervalId) {
        clearInterval(timerIntervalId);
        timerIntervalId = null;
      }
    }

    function startTimerCountdown() {
      stopTimerCountdown();
      if (timerSetSec <= 0) {
        timerRemainingSec = 0;
        updateTimerVisual();
        return;
      }

      timerRemainingSec = timerSetSec;
      updateTimerVisual();

      timerIntervalId = setInterval(() => {
        timerRemainingSec -= 1;

        if (timerRemainingSec <= 0) {
          timerRemainingSec = 0;
          timerSetSec = 0;
          updateTimerVisual();
          stopTimerCountdown();
          togglePower(false, true);
          return;
        }

        // Mechanical timers unwind while counting down, so keep the knob value in sync.
        timerSetSec = timerRemainingSec;
        updateTimerVisual();
        if (isOn) {
          statusText.textContent = `当前状态: 开机 (${speedSettings[currentSpeed].label}) · 剩余 ${formatTime(timerRemainingSec)}`;
        }
      }, 1000);
    }

    function setTimerBySeconds(sec) {
      timerSetSec = Math.max(0, Math.min(120, sec));
      if (!isOn) {
        timerRemainingSec = timerSetSec;
      }

      if (isOn) {
        if (timerSetSec === 0) {
          stopTimerCountdown();
          statusText.textContent = `当前状态: 开机 (${speedSettings[currentSpeed].label})`;
        } else {
          startTimerCountdown();
          statusText.textContent = `当前状态: 开机 (${speedSettings[currentSpeed].label}) · 剩余 ${formatTime(timerRemainingSec)}`;
        }
      }

      updateTimerVisual();
    }

    function increaseRotationCounter() {
      fanRotationCount += 1;
      setCounterValue.textContent = String(fanRotationCount);
    }

    function resetRotationCounter() {
      fanRotationCount = 0;
      setCounterValue.textContent = "0";
    }

    function updateTimerFromPointer(clientX, clientY) {
      const rect = timerKnob.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = clientX - cx;
      const dy = clientY - cy;
      const angle = (Math.atan2(dy, dx) * 180) / Math.PI;
      const nextSec = angleToSeconds(angle);
      setTimerBySeconds(nextSec);
    }

    function setActiveButton(targetBtn) {
      speedButtons.forEach((btn) => btn.classList.remove("active"));
      if (targetBtn) {
        targetBtn.classList.add("active");
      }
    }

    function applySpeed(level) {
      const setting = speedSettings[level];
      currentSpeed = level;
      rotor.style.animationDuration = `${setting.duration}s`;
      document.querySelectorAll(".wind-line").forEach((line) => {
        line.style.animationDuration = `${setting.wind}s`;
      });

      if (isOn) {
        if (level === "pause") {
          rotor.style.animationPlayState = "paused";
          wind.classList.remove("show-wind");
        } else {
          rotor.style.animationPlayState = "running";
          wind.classList.add("show-wind");
        }
      }

      if (isOn && timerSetSec > 0) {
        statusText.textContent = `当前状态: 开机 (${setting.label}) · 剩余 ${formatTime(timerRemainingSec)}`;
      } else {
        statusText.textContent = `当前状态: 开机 (${setting.label})`;
      }

      if (timerSetSec > 0) {
        lessonText.textContent = "第3步: 计时器会倒计时，到0后风扇会自动关闭。";
      } else {
        lessonText.textContent = "第2步: 可切换暂停、低、中、高档，再旋转计时器试试自动关机。";
      }

      if (level === "pause") setActiveButton(pauseBtn);
      if (level === "low") setActiveButton(lowBtn);
      if (level === "mid") setActiveButton(midBtn);
      if (level === "high") setActiveButton(highBtn);
    }

    function togglePower(forceState = null, fromTimer = false) {
      const targetState = forceState === null ? !isOn : forceState;
      if (targetState === isOn) {
        return;
      }

      isOn = targetState;

      if (isOn) {
        rotor.style.animationPlayState = "running";
        wind.classList.add("show-wind");
        powerBtn.textContent = "关闭风扇";
        speedButtons.forEach((btn) => {
          btn.disabled = false;
        });

        applySpeed(currentSpeed);

        if (timerSetSec > 0) {
          startTimerCountdown();
          lessonText.textContent = "第3步: 计时器开始倒计时，观察时间慢慢减少。";
        } else {
          stopTimerCountdown();
        }
      } else {
        stopTimerCountdown();
        rotor.style.animationPlayState = "paused";
        wind.classList.remove("show-wind");
        powerBtn.textContent = "打开风扇";
        speedButtons.forEach((btn) => {
          btn.disabled = true;
        });
        setActiveButton(null);

        statusText.textContent = "当前状态: 关机";
        if (fromTimer && timerSetSec > 0) {
          lessonText.textContent = "计时器到0，风扇自动关闭。再转动按钮设置新时间吧。";
        } else {
          lessonText.textContent = "第1步: 点击“打开风扇”，学习开关电风扇。";
        }
      }

      updateTimerVisual();
    }

    powerBtn.addEventListener("click", togglePower);
    pauseBtn.addEventListener("click", () => applySpeed("pause"));
    lowBtn.addEventListener("click", () => applySpeed("low"));
    midBtn.addEventListener("click", () => applySpeed("mid"));
    highBtn.addEventListener("click", () => applySpeed("high"));

    timerKnob.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      isKnobDragging = true;
      timerKnob.classList.add("dragging");
      timerKnob.setPointerCapture(event.pointerId);
      updateTimerFromPointer(event.clientX, event.clientY);
    });

    timerKnob.addEventListener("pointermove", (event) => {
      if (!isKnobDragging) {
        return;
      }
      updateTimerFromPointer(event.clientX, event.clientY);
    });

    timerKnob.addEventListener("pointerup", () => {
      isKnobDragging = false;
      timerKnob.classList.remove("dragging");
    });

    timerKnob.addEventListener("pointercancel", () => {
      isKnobDragging = false;
      timerKnob.classList.remove("dragging");
    });

    timerKnob.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === "ArrowUp") {
        event.preventDefault();
        setTimerBySeconds(timerSetSec + 5);
      }
      if (event.key === "ArrowLeft" || event.key === "ArrowDown") {
        event.preventDefault();
        setTimerBySeconds(timerSetSec - 5);
      }
    });

    rotor.addEventListener("animationiteration", () => {
      if (isOn) {
        increaseRotationCounter();
      }
    });

    resetCounterBtn.addEventListener("click", resetRotationCounter);

    updateTimerVisual();
  </script>
</body>
</html>
